services:

  # ==============================
  # Spring Boot App (production)
  #
  # MySQL and Redis are assumed to be already running on the EC2 host.
  # network_mode: host allows the container to reach EC2's localhost directly.
  #
  # Usage on EC2:
  #   export DB_URL=jdbc:mysql://localhost:3306/highteenday_db
  #   export DB_USERNAME=root
  #   export DB_PASSWORD=yourpassword
  #   export REDIS_HOST=localhost
  #   export JWT_KEY=...
  #   export AWS_ACCESS_KEY=...
  #   export AWS_SECRET_KEY=...
  #   export S3_BUCKET=...
  #   export GOOGLE_CLIENT_ID=...
  #   export GOOGLE_CLIENT_SECRET=...
  #   export NEIS_API_KEY=...
  #
  #   docker-compose -f docker-compose.prod.yml up -d
  # ==============================
  app:
    build: .
    container_name: highteenday-app
    restart: unless-stopped
    network_mode: host        # shares EC2 host network — localhost = EC2 itself
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_KEY: ${JWT_KEY}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEIS_API_KEY: ${NEIS_API_KEY}
