# ==============================
# Production Environment
# All sensitive values must be injected via environment variables (no hardcoding)
# Run: java -jar app.jar --spring.profiles.active=prod
# ==============================

# DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA (validate — block DDL changes; startup fails fast on schema mismatch)
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# ==============================
# Logging (minimal)
# ==============================
logging.level.com.example.highteenday_backend=WARN
logging.level.root=WARN

# p6spy fully disabled
decorator.datasource.p6spy.enable-logging=false
logging.level.p6spy=off

# ==============================
# Redis
# ==============================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

# ==============================
# CORS (production domain only)
# ==============================
app.cors.allowed-origins=https://highteenday.org,https://www.highteenday.org

# ==============================
# AWS S3
# Credentials are resolved automatically via EC2 Instance Profile (ec2-s3-role)
# No access key / secret key needed
# ==============================
cloud.aws.s3.bucket=${S3_BUCKET}

# ==============================
# OAuth2 Credentials
# ==============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Uncomment below and fill in credentials when Kakao/Naver apps are registered
# spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
# spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
# spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.kakao.client-authentication-method=POST
# spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

# spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
# spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
# spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
# spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
# spring.security.oauth2.client.registration.naver.client-authentication-method=POST
# spring.security.oauth2.client.registration.naver.scope=name,email

# ==============================
# School API (NEIS)
# ==============================
neis.api.key=${NEIS_API_KEY}

# ==============================
# JWT
# ==============================
jwt.key=${JWT_KEY}

# ==============================
# Swagger server URL (force HTTPS)
# ==============================
app.server-url=https://api.highteenday.org
