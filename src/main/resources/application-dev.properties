# ==============================
# Development Server Environment
# Inject sensitive values via environment variables: -Dkey=value or server env settings
# ==============================

# DB
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/highteenday_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA (update to apply schema changes automatically while preserving data)
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

# ==============================
# Logging (moderate)
# ==============================
logging.level.com.example.highteenday_backend=INFO
logging.level.com.example.highteenday_backend.services.domain.HotPostService=DEBUG

# p6spy disabled (performance overhead)
decorator.datasource.p6spy.enable-logging=false
logging.level.p6spy=warn

# ==============================
# Redis
# ==============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ==============================
# AWS S3
# Credentials are resolved via DefaultAWSCredentialsProviderChain (env vars or instance profile)
# ==============================
cloud.aws.s3.bucket=${S3_BUCKET:highteenday-bucket-0906}

# ==============================
# OAuth2 Credentials
# ==============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

