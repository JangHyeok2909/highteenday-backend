spring.application.name=highteenday-backend

# ==============================
# Springdoc / Swagger UI
# ==============================
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/swagger/api-docs
springdoc.webjars.prefix=/swagger

# ==============================
# Active Profile (default: local)
# Override:
#   Local : -Dspring.profiles.active=local  (or IDE Run Configuration)
#   Dev   : -Dspring.profiles.active=dev
#   Prod  : -Dspring.profiles.active=prod
# ==============================
spring.profiles.active=local

# ==============================
# Tomcat Thread / Connection Tuning
# ==============================
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=200
server.tomcat.max-connections=10000

# ==============================
# MVC
# ==============================
spring.mvc.hiddenmethod.filter.enabled=true

# ==============================
# JPA Common
# ==============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ==============================
# File Upload Limits
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================
# Session
# ==============================
server.servlet.session.timeout=1800

# ==============================
# AWS Region (bucket and credentials are profile-specific)
# ==============================
cloud.aws.region.static=ap-northeast-2
cloud.aws.stack.auto=false

# ==============================
# OAuth2 Google fixed settings (client-id/secret are profile-specific)
# Kakao/Naver: add the full registration.* block in each profile file
# once credentials are available (Spring Boot requires non-empty client-id
# whenever any registration.* key exists for that provider)
# ==============================
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=email,profile

# ==============================
# OAuth2 Provider Endpoints (fixed external URLs, not profile-specific)
# ==============================
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
