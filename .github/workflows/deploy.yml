name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,REDIS_HOST,REDIS_PORT,JWT_KEY,AWS_ACCESS_KEY,AWS_SECRET_KEY,S3_BUCKET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,NEIS_API_KEY
          script: |
            # Clone repo on first deploy, otherwise pull latest
            if [ ! -d ~/app ]; then
              git clone https://github.com/${{ github.repository }}.git ~/app
            fi
            cd ~/app
            git pull origin main

            # Write all values from GitHub Secrets (printf avoids special character issues e.g. !! in passwords)
            printf 'DB_URL=%s\n' "$DB_URL" > .env
            printf 'DB_USERNAME=%s\n' "$DB_USERNAME" >> .env
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" >> .env
            printf 'REDIS_HOST=%s\n' "$REDIS_HOST" >> .env
            printf 'REDIS_PORT=%s\n' "$REDIS_PORT" >> .env
            printf 'JWT_KEY=%s\n' "$JWT_KEY" >> .env
            printf 'AWS_ACCESS_KEY=%s\n' "$AWS_ACCESS_KEY" >> .env
            printf 'AWS_SECRET_KEY=%s\n' "$AWS_SECRET_KEY" >> .env
            printf 'S3_BUCKET=%s\n' "$S3_BUCKET" >> .env
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID" >> .env
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET" >> .env
            printf 'NEIS_API_KEY=%s\n' "$NEIS_API_KEY" >> .env

            # Build image and restart container
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build
